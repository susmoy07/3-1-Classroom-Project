<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - My Classroom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-shell" data-page="register">
  <div class="auth-layout">
    <div class="auth-hero">
      <div class="auth-hero-inner">
        <img src="assets/logo.png" alt="ClassSphere logo" class="auth-logo">
        <p class="auth-badge">Get started</p>
        <h2 class="auth-hero-title">Create your ClassSphere account</h2>
        <p class="auth-hero-text">
          Set up your teacher or student profile so you can join classrooms, access materials, and track results.
        </p>
      </div>
    </div>

    <div class="container form-container auth-card">
      <h1 id="authTitle">Create Account</h1>
      <p id="portalLabel" class="auth-portal-label"></p>
      <form data-auth="register-form" autocomplete="on" novalidate>
        <label for="name">Full Name</label>
        <input type="text" id="name" name="fullName" autocomplete="name" placeholder="Enter your full name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" placeholder="Create a password" required>

        <div class="form-row">
  <div class="file-upload">
  <label class="file-upload-label" for="profile">
    <span class="file-upload-icon">📷</span>
    Profile picture (optional)
  </label>
  <input type="file" id="profile" accept="image/*">
</div>
</div>

        <button type="submit" class="btn register-btn">Register</button>
      </form>
      <p id="authError" class="form-error" aria-live="polite"></p>
      <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </div>
  <script src="script.js"></script>
  <script>
document.querySelectorAll('.file-upload input[type=file]')
  .forEach(input => {
    input.addEventListener('change', () => {
      const wrapper = input.closest('.file-upload');
      if (wrapper) {
        wrapper.classList.toggle('has-file', input.files.length > 0);
      }
    });
  });
</script>
</body>
</html>
