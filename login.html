<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - My Classroom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-shell" data-page="login">
  <div class="auth-layout">
    <div class="auth-hero">
      <div class="auth-hero-inner">
        <img src="assets/logo.png" alt="ClassSphere logo" class="auth-logo">
        <p class="auth-badge">Secure access</p>
        <h2 class="auth-hero-title">Welcome back to ClassSphere</h2>
        <p class="auth-hero-text">
          Sign in to manage classrooms, share materials, and stay in sync with your students.
        </p>
      </div>
    </div>

    <div class="container form-container auth-card">
      <h1 id="authTitle">Login</h1>
      <p id="portalLabel" class="auth-portal-label"></p>
      <form data-auth="login-form" novalidate>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required>

        <label>Join as</label>
        <div class="auth-role-row">
          <label class="auth-role-option">
            <input type="radio" name="joinAs" value="student" checked>
            Student
          </label>
          <label class="auth-role-option">
            <input type="radio" name="joinAs" value="teacher">
            Teacher
          </label>
        </div>

        <button type="submit" class="btn login-btn">Login</button>
      </form>
      <p id="authError" class="form-error" aria-live="polite"></p>
      <p>Don't have an account? <a href="register.html">Register here</a></p>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
